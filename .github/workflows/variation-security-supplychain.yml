name: Variation Security Supply Chain

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: variation-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-scan:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
        working-directory: app
      - name: License checker report
        run: npx license-checker-rseidelsohn --summary
        working-directory: app

  vuln-and-sbom:
    runs-on: ubuntu-latest
    needs: [secret-scan, license-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile.raw -t sample-docker-build:security .

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sample-docker-build:security
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: sample-docker-build:security
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      - name: Create image tar for provenance
        run: docker save sample-docker-build:security -o /tmp/security-image.tar

      - name: Attest build provenance (image tar)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: /tmp/security-image.tar
