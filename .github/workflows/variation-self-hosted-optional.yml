name: Variation Self Hosted Optional

on:
  workflow_dispatch:
    inputs:
      run_self_hosted:
        description: Run self-hosted lane
        required: false
        default: "false"

jobs:
  ubuntu-hosted-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.raw -t sample-docker-build:hosted-ref .

  self-hosted-dind-style:
    if: ${{ inputs.run_self_hosted == 'true' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build on self-hosted runner
        run: docker build -f docker/Dockerfile.raw -t sample-docker-build:self-hosted .
