name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      smoke_port:
        required: false
        type: string
        default: "18110"

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develp
        with:
          app_token: ${{secrets.IR_API_KEY}}
          api_url: "https://app.stage.invisirisk.com"
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "sample-docker-build:${{ inputs.image_tag }}" \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            "${{ inputs.context }}"

      - name: Smoke
        uses: ./.github/actions/smoke-test
        with:
          image: sample-docker-build:${{ inputs.image_tag }}
          name: reusable-${{ inputs.variant_id }}
          host-port: ${{ inputs.smoke_port }}
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develp
        with:
          cleanup: "true"
          api_url: "https://app.stage.invisirisk.com"
      # ============= InvisiRisk Cleanup End =============