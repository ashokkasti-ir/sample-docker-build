name: Variation Scheduled Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: variation-scheduled-maintenance
  cancel-in-progress: true

jobs:
  nightly-core-subset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build nightly subset image
        run: docker build -f docker/Dockerfile.raw -t sample-docker-build:nightly .
      - name: Smoke nightly image
        uses: ./.github/actions/smoke-test
        with:
          image: sample-docker-build:nightly
          name: nightly-subset
          host-port: "18113"

  weekly-dependency-refresh-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate dependency report
        run: |
          {
            echo "# Dependency refresh report"
            echo
            echo "## npm outdated"
            npm --prefix app outdated || true
            echo
            echo "## python outdated"
            python -m pip install --upgrade pip >/dev/null 2>&1
            python -m pip list --outdated || true
            echo
            echo "## ruby outdated"
            bundle config set --local path vendor/bundle
            (cd samples/ruby && bundle install)
            (cd samples/ruby && bundle outdated) || true
            echo
            echo "## go list modules"
            (cd samples/go && go list -m all)
          } > dependency-report.txt

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.txt
